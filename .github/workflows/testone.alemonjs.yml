name: 在线测试

on:
  push:
    branches:
      - main

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: 结账代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: version 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 缓存前端依赖
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-testone-${{ hashFiles('yarn.lock') }}

      - name: set system time
        id: beijing_time
        run: echo "BEIJING_TIME=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: delete .npmrc
        run: rm -rf .npmrc

      - name: yarn install
        run: yarn install --ignore-engines

      - name: build
        run: yarn build --base /alemonjs-testone/

      - name: push docs
        run: |
          cd dist-testone/
          git init
          git config --local user.email "ningmengchongshui@gmail.com"
          git config --local user.name "ningmengchongshui"
          git add -A
          git commit -m "自动打包 - ${{ env.BEIJING_TIME }}"
          git remote add github https://lemonade-lab:${{ secrets.GITHUB_TOKEN }}@github.com/lemonade-lab/alemonjs-testone.git
          git push github HEAD:docs -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  testone:
    runs-on: ubuntu-latest

    steps:
      - name: 结账代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: version 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 缓存依赖
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-testone-${{ hashFiles('yarn.lock') }}

      - name: set system time
        id: beijing_time
        run: echo "BEIJING_TIME=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: delete .npmrc
        run: rm -rf .npmrc

      - name: yarn install
        run: yarn install --ignore-engines

      - name: build
        run: yarn build --base /testone/

      - name: push testone
        run: |
          cd dist-testone/
          git init
          git config --local user.email "ningmengchongshui@gmail.com"
          git config --local user.name "ningmengchongshui"
          git add -A
          git commit -m "自动打包 - ${{ env.BEIJING_TIME }}"
          git remote add github https://lemonade-lab:${{ secrets.GITHUB_TOKEN }}@github.com/lemonade-lab/alemonjs-testone.git
          git push github HEAD:testone -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
